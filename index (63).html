<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComptaGestion — Les comptes de charges et de produits</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2236;
  --bg-card-hover: #1f2a42;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-green: #10b981;
  --accent-orange: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #8b5cf6;
  --accent-pink: #ec4899;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: #2a3654;
  --glow-blue: rgba(59,130,246,0.3);
  --glow-green: rgba(16,185,129,0.3);
  --charge-color: #f97316;
  --produit-color: #22d3ee;
  --debit-color: #f59e0b;
  --credit-color: #a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(59,130,246,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.06) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(6,182,212,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;background:rgba(59,130,246,0.4);border-radius:50%;animation:float-particle linear infinite}
@keyframes float-particle{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) translateX(50px);opacity:0}}
.app-container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:20px}
.header{text-align:center;padding:40px 20px 30px;animation:fadeInDown 0.8s ease}
.header-badge{display:inline-block;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));padding:6px 18px;border-radius:20px;font-size:0.75rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.header h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--accent-cyan) 50%,var(--accent-blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:8px}
.header p{font-size:1.05rem;color:var(--text-secondary);font-weight:300}
.progress-container{background:var(--bg-card);border-radius:16px;padding:20px 24px;margin-bottom:24px;border:1px solid var(--border);animation:fadeIn 0.6s ease 0.2s both}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.progress-header span{font-size:0.85rem;color:var(--text-secondary);font-weight:500}
.progress-score{font-family:'Space Mono',monospace;font-size:0.9rem;color:var(--accent-green);font-weight:700}
.progress-bar{height:8px;background:var(--bg-primary);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-blue),var(--accent-cyan));border-radius:4px;transition:width 0.6s cubic-bezier(0.22,1,0.36,1);width:0%}
.progress-steps{display:flex;justify-content:space-between;margin-top:12px;gap:4px}
.step-dot{flex:1;height:4px;border-radius:2px;background:var(--bg-primary);transition:background 0.4s,box-shadow 0.4s;cursor:pointer}
.step-dot.completed{background:var(--accent-green);box-shadow:0 0 8px var(--glow-green)}
.step-dot.active{background:var(--accent-blue);box-shadow:0 0 8px var(--glow-blue)}
.exercise-container{animation:fadeInUp 0.5s ease}
.exercise-card{background:var(--bg-card);border-radius:20px;padding:32px;border:1px solid var(--border);margin-bottom:20px}
.exercise-number{font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--accent-cyan);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.exercise-title{font-size:1.6rem;font-weight:800;margin-bottom:6px}
.exercise-subtitle{font-size:0.95rem;color:var(--text-secondary);line-height:1.6;margin-bottom:24px}
.theory-box{background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(139,92,246,0.05));border:1px solid rgba(59,130,246,0.2);border-radius:14px;padding:20px 24px;margin-bottom:24px;position:relative;overflow:hidden}
.theory-box::before{content:'💡';position:absolute;top:-10px;right:10px;font-size:3rem;opacity:0.15}
.theory-box h3{font-size:0.95rem;color:var(--accent-blue);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.theory-box p,.theory-box li{font-size:0.9rem;color:var(--text-secondary);line-height:1.7}
.theory-box ul{list-style:none;padding:0}
.theory-box ul li::before{content:'▸ ';color:var(--accent-cyan);font-weight:700}
.schema-container{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin:20px 0}
.schema-block{background:var(--bg-primary);border-radius:14px;padding:18px 24px;text-align:center;border:2px solid var(--border);min-width:140px;transition:all 0.3s;animation:popIn 0.5s ease both}
.schema-block:hover{transform:translateY(-4px);border-color:var(--accent-blue);box-shadow:0 8px 30px rgba(59,130,246,0.15)}
.schema-block .icon{font-size:2rem;margin-bottom:6px}
.schema-block .label{font-size:0.8rem;color:var(--text-muted);font-weight:500}
.schema-block .value{font-size:1.1rem;font-weight:700;margin-top:2px}
.schema-block.charge{border-color:var(--charge-color)}
.schema-block.charge .value{color:var(--charge-color)}
.schema-block.produit{border-color:var(--produit-color)}
.schema-block.produit .value{color:var(--produit-color)}
.schema-block.bilan{border-color:var(--accent-blue)}
.schema-block.bilan .value{color:var(--accent-blue)}
.schema-arrow{display:flex;align-items:center;font-size:1.5rem;color:var(--text-muted);animation:pulse-arrow 1.5s infinite}
@keyframes pulse-arrow{0%,100%{opacity:0.4;transform:translateX(0)}50%{opacity:1;transform:translateX(4px)}}
.t-account{background:var(--bg-primary);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin:16px 0;max-width:400px}
.t-account-header{text-align:center;padding:10px;font-weight:700;font-size:0.9rem;border-bottom:2px solid var(--border)}
.t-account-body{display:grid;grid-template-columns:1fr 1fr;min-height:60px}
.t-account-debit,.t-account-credit{padding:12px 16px;font-size:0.85rem;text-align:center}
.t-account-debit{border-right:2px solid var(--border);color:var(--debit-color)}
.t-account-credit{color:var(--credit-color)}
.t-account-label{font-size:0.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.6;margin-bottom:4px}
.quiz-grid{display:grid;gap:12px;margin:16px 0}
.quiz-item{background:var(--bg-primary);border:2px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:all 0.3s}
.quiz-item .question-text{flex:1;font-size:0.92rem;line-height:1.5}
.quiz-item .options{display:flex;gap:8px;flex-shrink:0}

/* === OPTION BUTTONS WITH IMPROVED SELECTION === */
.option-btn{padding:8px 18px;border-radius:10px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-family:'Outfit',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all 0.25s;white-space:nowrap;position:relative}
.option-btn:hover{border-color:var(--accent-blue);background:rgba(59,130,246,0.1);transform:translateY(-2px)}

/* DEFAULT SELECTED - bright blue glow + checkmark */
.option-btn.selected{border-color:var(--accent-blue)!important;background:rgba(59,130,246,0.25)!important;color:#fff!important;box-shadow:0 0 14px rgba(59,130,246,0.4),inset 0 0 20px rgba(59,130,246,0.1);transform:scale(1.05)}
.option-btn.selected::after{content:'✓';position:absolute;top:-7px;right:-7px;width:20px;height:20px;background:var(--accent-blue);border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;box-shadow:0 2px 8px rgba(59,130,246,0.5)}

/* CHARGE SELECTED - orange glow */
.option-btn.charge-btn.selected{border-color:var(--charge-color)!important;background:rgba(249,115,22,0.3)!important;color:#fff!important;box-shadow:0 0 14px rgba(249,115,22,0.4),inset 0 0 20px rgba(249,115,22,0.08)}
.option-btn.charge-btn.selected::after{background:var(--charge-color);box-shadow:0 2px 8px rgba(249,115,22,0.5)}

/* PRODUIT SELECTED - cyan glow */
.option-btn.produit-btn.selected{border-color:var(--produit-color)!important;background:rgba(34,211,238,0.25)!important;color:#fff!important;box-shadow:0 0 14px rgba(34,211,238,0.4),inset 0 0 20px rgba(34,211,238,0.08)}
.option-btn.produit-btn.selected::after{background:var(--produit-color);box-shadow:0 2px 8px rgba(34,211,238,0.5)}

/* DEBIT SELECTED - yellow/amber glow */
.option-btn.debit-btn.selected{border-color:var(--debit-color)!important;background:rgba(245,158,11,0.3)!important;color:#fff!important;box-shadow:0 0 14px rgba(245,158,11,0.4),inset 0 0 20px rgba(245,158,11,0.08)}
.option-btn.debit-btn.selected::after{background:var(--debit-color);box-shadow:0 2px 8px rgba(245,158,11,0.5)}

/* CREDIT SELECTED - purple glow */
.option-btn.credit-btn.selected{border-color:var(--credit-color)!important;background:rgba(167,139,250,0.3)!important;color:#fff!important;box-shadow:0 0 14px rgba(167,139,250,0.4),inset 0 0 20px rgba(167,139,250,0.08)}
.option-btn.credit-btn.selected::after{background:var(--credit-color);box-shadow:0 2px 8px rgba(167,139,250,0.5)}

/* After checking - correct/incorrect overrides */
.option-btn.correct{border-color:var(--accent-green)!important;background:rgba(16,185,129,0.15)!important;color:var(--accent-green)!important;box-shadow:none;transform:scale(1);animation:correct-pulse 0.5s ease}
.option-btn.correct::after{display:none}
.option-btn.incorrect{border-color:var(--accent-red)!important;background:rgba(239,68,68,0.15)!important;color:var(--accent-red)!important;box-shadow:none;transform:scale(1);animation:shake 0.4s ease}
.option-btn.incorrect::after{display:none}

@keyframes correct-pulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.quiz-item.answered-correct{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.03)}
.quiz-item.answered-incorrect{border-color:rgba(239,68,68,0.2);background:rgba(239,68,68,0.03)}
.quiz-item .feedback{font-size:0.8rem;margin-top:8px;padding:8px 12px;border-radius:8px;display:none}
.quiz-item .feedback.show{display:block}
.quiz-item .feedback.correct-fb{background:rgba(16,185,129,0.1);color:var(--accent-green)}
.quiz-item .feedback.incorrect-fb{background:rgba(239,68,68,0.1);color:var(--accent-red)}
.invoice{background:linear-gradient(135deg,#1e293b,#1a2332);border:1px solid var(--border);border-radius:14px;padding:24px;margin:16px 0;position:relative}
.invoice::before{content:'📄 FACTURE';position:absolute;top:-12px;left:20px;background:var(--accent-blue);color:white;font-size:0.7rem;font-weight:700;letter-spacing:2px;padding:4px 14px;border-radius:6px}
.invoice-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-top:8px}
.invoice-header .company{font-weight:700;font-size:1.05rem}
.invoice-header .details{text-align:right;font-size:0.85rem;color:var(--text-secondary)}
.invoice-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.9rem}
.invoice-line.total{border-bottom:none;border-top:2px solid var(--accent-blue);margin-top:8px;padding-top:12px;font-weight:700;font-size:1rem;color:var(--accent-cyan)}
.invoice-line .amount{font-family:'Space Mono',monospace;font-weight:700}
.entry-select,.entry-input{background:var(--bg-primary);border:2px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:0.85rem;width:100%;min-width:80px;transition:border-color 0.3s}
.entry-select:focus,.entry-input:focus{outline:none;border-color:var(--accent-blue)}
.entry-select{cursor:pointer;appearance:none}
.entry-input{text-align:right}
.entry-input.correct-input,.entry-select.correct-input{border-color:var(--accent-green);background:rgba(16,185,129,0.05)}
.entry-input.incorrect-input,.entry-select.incorrect-input{border-color:var(--accent-red);background:rgba(239,68,68,0.05)}
.btn{padding:12px 28px;border-radius:12px;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));color:white;box-shadow:0 4px 15px rgba(59,130,246,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(59,130,246,0.4)}
.btn-success{background:linear-gradient(135deg,var(--accent-green),#059669);color:white}
.btn-success:hover{transform:translateY(-2px)}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text-primary)}
.btn-outline:hover{border-color:var(--accent-blue);background:rgba(59,130,246,0.05)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;justify-content:center}
.result-banner{padding:16px 20px;border-radius:12px;margin:16px 0;font-weight:600;display:flex;align-items:center;gap:12px;animation:fadeIn 0.4s ease}
.result-banner.success{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:var(--accent-green)}
.result-banner.error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:var(--accent-red)}
.result-banner.info{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.3);color:var(--accent-blue)}
.tag{display:inline-block;padding:2px 10px;border-radius:6px;font-size:0.8rem;font-weight:700}
.tag-charge{background:rgba(249,115,22,0.15);color:var(--charge-color);border:1px solid rgba(249,115,22,0.3)}
.tag-produit{background:rgba(34,211,238,0.15);color:var(--produit-color);border:1px solid rgba(34,211,238,0.3)}
.tag-debit{background:rgba(245,158,11,0.15);color:var(--debit-color);border:1px solid rgba(245,158,11,0.3)}
.tag-credit{background:rgba(167,139,250,0.15);color:var(--credit-color);border:1px solid rgba(167,139,250,0.3)}
.tag-bilan{background:rgba(59,130,246,0.15);color:var(--accent-blue);border:1px solid rgba(59,130,246,0.3)}
.tag-gestion{background:rgba(236,72,153,0.15);color:var(--accent-pink);border:1px solid rgba(236,72,153,0.3)}
.landing{text-align:center;padding:40px 20px}
.landing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin:30px 0}
.level-card{background:var(--bg-card);border:2px solid var(--border);border-radius:16px;padding:24px;text-align:left;transition:all 0.3s;cursor:default;position:relative;overflow:hidden}
.level-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.level-card:nth-child(1)::after{background:var(--accent-blue)}.level-card:nth-child(2)::after{background:var(--accent-cyan)}.level-card:nth-child(3)::after{background:var(--accent-orange)}.level-card:nth-child(4)::after{background:var(--accent-purple)}.level-card:nth-child(5)::after{background:var(--accent-green)}.level-card:nth-child(6)::after{background:var(--accent-pink)}.level-card:nth-child(7)::after{background:var(--accent-red)}
.level-card .level-num{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.level-card .level-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.level-card .level-desc{font-size:0.82rem;color:var(--text-secondary);line-height:1.5}
.level-card .level-icon{font-size:2rem;position:absolute;top:16px;right:16px;opacity:0.3}
.scenario-box{background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(236,72,153,0.05));border:1px solid rgba(139,92,246,0.2);border-radius:14px;padding:18px 22px;margin:16px 0;display:flex;gap:14px;align-items:flex-start}
.scenario-box .scenario-icon{font-size:1.5rem;flex-shrink:0}
.scenario-box .scenario-text{font-size:0.9rem;line-height:1.6;color:var(--text-secondary)}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confetti-fall 3s ease-in forwards}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.final-screen{text-align:center;padding:40px 20px}
.trophy{font-size:5rem;animation:bounce 1s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.final-score{font-family:'Space Mono',monospace;font-size:4rem;font-weight:700;margin:20px 0}
.grade{font-size:1.2rem;font-weight:600;margin-bottom:10px}
.grade-bar{display:flex;gap:4px;justify-content:center;margin:20px 0}
.grade-segment{width:30px;height:8px;border-radius:4px;background:var(--border);transition:background 0.5s}
.grade-segment.filled{background:var(--accent-green)}
.hidden{display:none!important}
html{scroll-behavior:smooth}
@media(max-width:768px){.exercise-card{padding:20px 16px}.quiz-item{flex-direction:column;align-items:stretch}.quiz-item .options{justify-content:center}.schema-container{flex-direction:column;align-items:center}.schema-arrow{transform:rotate(90deg)}.invoice-header{flex-direction:column;gap:8px}.invoice-header .details{text-align:left}}
</style>

<body>
<div class="particles" id="particles"></div>
<div class="app-container" id="app"></div>
<script>

const EXERCISES = [
  { id:'ex1', num:'Exercice 01', title:'Les classes comptables', icon:'🏛️', desc:'Rappel des 7 classes du PCMN et distinction bilan/gestion' },
  { id:'ex2', num:'Exercice 02', title:'Charge ou Produit ?', icon:'⚖️', desc:'Identifier si une opération génère une charge ou un produit' },
  { id:'ex3', num:'Exercice 03', title:'Le bon numéro de compte', icon:'🔢', desc:'Trouver le numéro et nom de compte PCMN correspondant' },
  { id:'ex4', num:'Exercice 04', title:'Débit ou Crédit ?', icon:'↔️', desc:'Maîtriser le sens de fonctionnement des comptes de gestion' },
  { id:'ex5', num:'Exercice 05', title:'Comptabilise la facture', icon:'📄', desc:'Enregistrer une facture complète dans les comptes en T' },
  { id:'ex6', num:'Exercice 06', title:'Bilan ou Gestion ?', icon:'🎯', desc:'Distinguer comptes de bilan et comptes de gestion' },
  { id:'ex7', num:'Exercice 07', title:'Le Grand Défi', icon:'🏆', desc:'Synthèse complète : comptabiliser plusieurs opérations' }
];

let state = { currentExercise: -1, scores: [0,0,0,0,0,0,0], maxScores: [0,0,0,0,0,0,0], completed: [false,false,false,false,false,false,false] };
const app = document.getElementById('app');

function createParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100+'%';
    p.style.animationDuration = (8+Math.random()*12)+'s';
    p.style.animationDelay = Math.random()*10+'s';
    p.style.width = p.style.height = (2+Math.random()*3)+'px';
    c.appendChild(p);
  }
}

function renderApp() {
  if (state.currentExercise === -1) renderLanding();
  else if (state.currentExercise === 99) renderFinalScreen();
  else renderExercise(state.currentExercise);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderHeader() {
  return `<div class="header"><div class="header-badge">4e Technique — Comptabilité</div><h1>ComptaGestion</h1><p>Maîtrise les comptes de charges et de produits</p></div>`;
}

function renderProgress() {
  const total = state.completed.filter(Boolean).length;
  const pct = (total / 7) * 100;
  const score = state.scores.reduce((a,b) => a+b, 0);
  const maxScore = state.maxScores.reduce((a,b) => a+b, 0);

  ['o1','o2','o3','o4'].forEach(ok=>{const exp=[...EX7_EXP[ok]];for(let l=1;l<=3;l++){const cs=document.querySelector(`[data-q="${ok}c${l}"]`),ss=document.querySelector(`[data-q="${ok}s${l}"]`),mi=document.querySelector(`[data-q="${ok}m${l}"]`),cv=cs?.value||'',sv=ss?.value||'',mv=parseAmount(mi?.value);const idx=exp.findIndex(e=>{const em=parseFloat(e.m);return e.c===cv&&e.s===sv&&mv!==null&&Math.abs(mv-em)<0.01;});if(idx>=0){score++;cs.classList.add('correct-input');ss.classList.add('correct-input');mi.classList.add('correct-input');exp.splice(idx,1);}else{cs.classList.add('incorrect-input');ss.classList.add('incorrect-input');mi.classList.add('incorrect-input');}cs.disabled=true;ss.disabled=true;mi.disabled=true;}});
  state.scores[6]=score;state.maxScores[6]=max;state.completed[6]=true;
  document.getElementById('ex7-result').innerHTML=`<div class="result-banner ${score>=9?'success':score>=5?'info':'error'}"><span style="font-size:1.5rem">${score>=9?'🏆':'💪'}</span><span>${score}/${max} — ${score>=9?'Fantastique ! Tu maîtrises tout !':'Continue, tu progresses !'}</span></div><div class="theory-box" style="margin-top:16px"><h3>📝 Corrections</h3><p><strong>Op. 1 :</strong> 6040 D 2 400 | 4110 D 504 | 4400 C 2 904</p><p><strong>Op. 2 :</strong> 6120 D 65 | 4110 D 13,65 | 4400 C 78,65</p><p><strong>Op. 3 :</strong> 7000 C 150 | 4510 C 31,50 | 4000 D 181,50</p><p><strong>Op. 4 :</strong> 6100 D 750 | 4110 D 157,50 | 4400 C 907,50</p></div>`;
  document.getElementById('ex7-check').classList.add('hidden');document.getElementById('ex7-next').classList.remove('hidden');if(score>=9)launchConfetti();
}
function finishAll(){state.currentExercise=99;renderApp();}

// ============= FINAL SCREEN =============
function renderFinalScreen() {
  const ts=state.scores.reduce((a,b)=>a+b,0),tm=state.maxScores.reduce((a,b)=>a+b,0),pct=tm>0?Math.round(ts/tm*100):0;
  let grade,gc,msg;
  if(pct>=90){grade='A — Excellent !';gc='var(--accent-green)';msg='Tu maîtrises parfaitement les comptes de gestion !';}
  else if(pct>=75){grade='B — Très bien !';gc='var(--accent-cyan)';msg='Très bonne compréhension. Quelques détails à revoir.';}
  else if(pct>=60){grade='C — Bien';gc='var(--accent-blue)';msg='Bonne base ! Revois les exercices 4 et 5.';}
  else if(pct>=40){grade='D — À améliorer';gc='var(--accent-orange)';msg='Les bases sont là, mais plus de pratique nécessaire.';}
  else{grade='E — À retravailler';gc='var(--accent-red)';msg='Recommence les exercices et relis la théorie.';}
  const fs=Math.round(pct/10);
  app.innerHTML=`${renderHeader()}<div class="final-screen"><div class="exercise-card"><div class="trophy">${pct>=75?'🏆':pct>=50?'🥈':'📚'}</div><div class="final-score" style="color:${gc}">${pct}%</div><div class="grade" style="color:${gc}">${grade}</div><div class="grade-bar">${Array.from({length:10},(_,i)=>`<div class="grade-segment ${i<fs?'filled':''}"></div>`).join('')}</div><p style="color:var(--text-secondary);max-width:500px;margin:0 auto 24px;line-height:1.6">${msg}</p><div style="text-align:left;max-width:500px;margin:0 auto"><h3 style="margin-bottom:12px;font-size:1rem">Détail par exercice :</h3>${EXERCISES.map((ex,i)=>{const s=state.scores[i],m=state.maxScores[i],p=m>0?Math.round(s/m*100):0;return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:1.2rem">${ex.icon}</span><span style="flex:1;font-size:0.9rem">${ex.title}</span><span style="font-family:'Space Mono',monospace;font-size:0.85rem;color:${p>=70?'var(--accent-green)':p>=40?'var(--accent-orange)':'var(--accent-red)'}">${s}/${m}</span><span style="font-size:0.8rem;color:var(--text-muted);width:40px;text-align:right">${p}%</span></div>`;}).join('')}</div><div class="btn-group" style="margin-top:30px"><button class="btn btn-outline" onclick="resetAll()">🔄 Recommencer</button><button class="btn btn-primary" onclick="backToMenu()">↩ Menu principal</button></div></div></div>`;
  if(pct>=75)launchConfetti();
}
function resetAll(){state={currentExercise:-1,scores:[0,0,0,0,0,0,0],maxScores:[0,0,0,0,0,0,0],completed:[false,false,false,false,false,false,false]};ex1Answers={};ex2Answers={};ex4Answers={};ex6Answers={};renderApp();}
function launchConfetti(){const c=document.createElement('div');c.className='confetti-container';document.body.appendChild(c);const cols=['#3b82f6','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*1.5+'s';p.style.animationDuration=(2+Math.random()*2)+'s';p.style.borderRadius=Math.random()>0.5?'50%':'2px';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';c.appendChild(p);}setTimeout(()=>c.remove(),4000);}
createParticles();renderApp();

</script>
